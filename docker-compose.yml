services:
  db:
    image: postgres:15-alpine
    container_name: habit_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: habit_tracker_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: 
      context: ./api
    container_name: habit_api
    restart: always
    env_file:
      - .env_docker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy # Waits for DB to be fully ready before starting migrations!

  ui:
    build: 
      context: ./ui
    container_name: habit_ui
    restart: always
    env_file:
      - .env_docker
    ports:
      - "8501:8501"
    depends_on:
      - api

# Define the persistent volume for the database
volumes:
  pgdata: